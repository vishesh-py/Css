<!--
Specificity: Specificity is a set of rules applied by browsers to determine which CSS rule is applied to an element when there are multiple rules that could apply.
It is calculated based on the types of selectors used in the CSS rule.  

Priority of selectors from highest to lowest:

1. Id Selector (#id)
2. Class Selector (.class)  
3. Type Selector (element)

Priority : Id > Class > Type. 

To make styles easy to edit, it’s best to style with a type selector, if possible. 
If not, add a class selector. If that is not specific enough, then consider using an ID selector.
-->
