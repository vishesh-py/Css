<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
    <link rel="stylesheet" href="universal.css">
</head>
<body>
    <h1>Universal Selector</h1>
    <p>The universal selector in CSS is represented by the asterisk (*) symbol. It is used to select all elements on a web page, regardless of their type or class. When you apply styles using the universal selector, it will affect every element in the document.</p>
    <br>
    <h2>Cascading Style Sheet</h2>

<!--
    
Universal Selector 
the universal selector selects all elements of any type.

The universal selector uses the * character in the same place where you specified the type selector in a ruleset, like so:

* { 
  font-family: Verdana;
}

-->
</body>
</html>
