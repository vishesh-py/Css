Chaining in Css means selecting the elements with multiple selectors. 
It is used to apply styles to elements that match all the specified selectors. 

For example:
p.Intro {
    color: red;
    font-family: Calibri;
}

Regardless of the type of selector. it is followed by "." and then the class name or id name.
