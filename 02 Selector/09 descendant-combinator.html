<!--
Descendant combinator is used to select elements that are descendants of a specified element. 
It is represented by a space between two selectors. 

For example, if you want to select all <li> elements that are descendants of an <ol> element, you can use the following CSS selector: 
    
ol li {
    /* CSS properties */
}   

-->
