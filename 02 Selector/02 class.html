<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class</title>
    <link rel="stylesheet" href="class.css">
</head>
<body>
    <h1 class="heading">Introduction</h1>
    <br>
    <p class="writing heading">My name is Vishesh Verma. I am student of bachelor of Technology in Computer Science and Engineering with specilisation of Artificial Intelligence and Machine Learning.</p>
    <br>
    <h1 class="heading">Education</h1>
    <br>
    <p class="writing heading">I have completed my schooling from Sanmati Vidya Mandir Public School, Chhatarpur.</p>
    <br>
    <h2 class="heading">Thank you ❤️</h2>

<!--
Class is a user defined selector in CSS. It is used to target specific elements in the HTML document and apply styles to them. 
A class selector is defined by a period (.) followed by the class name. The class name can be any valid identifier, and it is case-sensitive.

To use a class selector, you need to add the class attribute to the HTML element you want to target and assign it the class name. Then, in your CSS,
you can define the styles for that class selector. For example, if you have an HTML element like this:

<p class="my-class">This is a paragraph.</p>

You can define the styles for the class selector in your CSS like this:

.my-class {
    color: blue;
    font-size: 16px;
}

Note - If we have mulitple classes then we will add multiple class by spacing, For example :

<p class="class1 class2">This is a paragraph.</p>

-->    
</body>
</html>
