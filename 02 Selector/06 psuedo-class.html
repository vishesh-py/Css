<body>
    <h1>Psuedo Class Example with hover properly</h1>
    
    <a href="https://www.youtube.com">Open Youtube</a>
    
<!--
Psudo Class: A pseudo-class is a keyword added to selectors that specifies a special state of the selected elements.
For example, :hover applies when the user designates an element (with some pointing device), but does not activate it. 
It is commonly used to change the appearance of links when the user hovers over them.    

For their usage it is used with selectors and it is added with a colon(:) before the keyword.

For example:

a:hover {
    color: red;
    font-family: Calibri;
}
-->
