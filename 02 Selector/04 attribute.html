<!--
The attribute selector can be used to target HTML elements that already contain attributes.

1. Simple Attribute Selector -----

The syntax for an attribute selector is as follows:
[attribute] {
  /* CSS properties */
}
In the above syntax, attribute is the name of the attribute you want to target. 
The CSS properties defined within the curly braces will be applied to all elements that have the specified attribute.

2. Specific Attribute Selector ------

One way is by using type[attribute*=value] for making it more specific. 
This will select elements of a specific type that have an attribute containing a certain value.
For example, if you want to target all anchor (<a>) elements that have an href attribute, you can use the following CSS:
a[href] {
  /* CSS properties */
}   
This will apply the specified CSS properties to all anchor elements that have an href attribute, regardless of its value.
