<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id</title>
</head>
<body>
    <h1 id="heading">Eduyantra</h1>
    <p id="joy">Eduyantra is a page of learning of joy</p>

<!--

Id Selector is a type of selector where we will select the html element with a specific id attribute.
The id selector is defined by using the hash symbol (#) followed by the id name. 
It is used to target a single unique element on the page, as the id attribute should be unique within an HTML document.  

Html element with id attribute:

<h1 id="heading"> This is a heading </h1>

Css element using styling look likes :

#heading {
    color: red;
}
-->    
    
</body>
</html>
