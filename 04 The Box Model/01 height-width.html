<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height and Width</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            background-color: lightblue;
        }
    </style>
</head>
<body>
    <div>
        <p>This div has a width of 200 pixels and a height of 100 pixels.</p>
    </div>

<!--
Width and height of an element can be set using the CSS properties `width` and `height`. 
These properties define the content area of the element. 
The total size of the element will also include padding, borders, and margins, which can be adjusted using the box model properties.    
-->    
</body>
</html>
