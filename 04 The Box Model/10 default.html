<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>default</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div>
        <p>This div has a width of 200 pixels and a height of 100 pixels.</p>
    </div>

<!--
Reset deafault margin and padding for all elements to 0 using the universal selector (*). 
This ensures that all elements start with a consistent baseline, eliminating any default spacing that browsers may apply. 
This is a common practice in CSS to create a clean slate for styling and layout, allowing you to have more control over the appearance of your web page. 

# Note that both properties are set to 0. When these properties are set to 0, they do not require a unit of measurement.
-->    
</body>
</html>
