<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            border: 1px solid black;
            padding: 10px;
            padding-bottom: 30px;
            text-align: justify;
            border-radius: 20px;
        }
        #padding {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            border: 1px solid black;
            padding: 1px 2px 3px 4px;
            text-align: justify;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div>
        <p>This div has a width of 200 pixels, a height of 100 pixels, and padding of 10 pixels on all sides.</p>
    </div>
    <div id="padding">
        <p>This div has a width of 200 pixels, a height of 100 pixels, and padding of 1px 2px 3px 4px.</p>
    </div>

<!--
The space between the contents of a box and the borders of a box is known as padding.   

The padding property is often used to expand the background color and make the content look less cramped.

If you want to be more specific about the amount of padding on each side of a box’s content, you can use the following properties:

padding-top: the width of the top padding for an element.
padding-right: the width of the right padding for an element.
padding-bottom: the width of the bottom padding for an element.
padding-left: the width of the left padding for an element.

Each property affects the padding on only one side of the box’s content, giving you more flexibility in customization.

Padding Shorthand Property allows you to set the padding for all four sides of an element in one declaration. 
The values are applied in a specific order: top, right, bottom, left.
If you provide fewer than four values, the missing values will be filled in based on the number of values provided.

Case 1 - If you provide one value, it will be applied to all four sides of the element.
padding: 10px; /* Applies 10px padding to all sides */

Case 2 - If you provide two values, the first value will be applied to the top and bottom, and the second value will be applied to the left and right.
padding: 10px 20px; /* Applies 10px padding to top and bottom, and 20px padding to left and right */

Case 3 - If you provide three values, the first value will be applied to the top, the second value will be applied to the left and right, and the third value will be applied to the bottom.
padding: 10px 20px 30px; /* Applies 10px padding to top, 20px padding to left and right, and 30px padding to bottom */

Case 4 - If you provide four values, they will be applied to the top, right, bottom, and left sides of the element in that order.   

Example : .class{
    padding: 10px 20px 30px 40px; /* Applies 10px padding to top, 20px padding to right, 30px padding to bottom, and 40px padding to left */
}

.class1 {
    padding: 10px 20px; /* Applies 10px padding to top and bottom, and 20px padding to left and right */
}
-->    
</body>
</html>
