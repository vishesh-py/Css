<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        div {
            width: 800px;
            height: 600px;
            background-color: lightblue;
            border: 5px dotted black;
        }
        .text {
            font-size: 24px;
            color: darkblue;
            text-align: justify;
        }
        .skill {
            font-size: 18px;
            color: darkgreen;
            text-align: justify;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="text">Introduction</h1><br>
        <p class="text">These all are my technical skills</p>
        <ul>
            <li class="skill">HTML</li>
            <li class="skill">CSS</li>
            <li class="skill">JavaScript</li>
            <li class="skill">Python</li>
            <li class="skill">Java</li>
        </ul>
    </div>

<!--
Border is a CSS property that allows you to add a border around an element.
The `border` property is a shorthand for setting the width, style, and color of the border in one declaration.

1 width — The thickness of the border. A border’s thickness can be set in pixels or with one of the following keywords: thin, medium, or thick.
2 style — The design of the border. Web browsers can render any of 10 different styles. Some of these styles include: none, dotted, and solid.

style {
/* Keyword values */
border-style: none;
border-style: hidden;
border-style: dotted;
border-style: dashed;
border-style: solid;
border-style: double;
border-style: groove;
border-style: ridge;
border-style: inset;
border-style: outset;

/* top and bottom | left and right */
border-style: dotted solid;

/* top | left and right | bottom */
border-style: hidden double dashed;

/* top | right | bottom | left */
border-style: none solid dotted dashed;

/* Global values */
border-style: inherit;
border-style: initial;
border-style: revert;
border-style: revert-layer;
border-style: unset;
}

3 color — The color of the border. You can set the color using a color name, a hex code, an RGB value, or an HSL value.

for example:
style { 
border: 5px dotted black;
}
-->    
</body>
</html>
