<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity</title>
    <style>
        h1 {
            opacity: 0.5;
        }
        p {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Opacity</h1>
    <p>This is a paragraph with reduced opacity.</p>

<!--
Opacity is a CSS property that specifies the transparency level of an element.
It can take values from 0 to 1, where 0 is completely transparent and 1 is completely opaque.

for example :
h1 {
    opacity: specified-opacity;
}

-->    
</body>
</html>
