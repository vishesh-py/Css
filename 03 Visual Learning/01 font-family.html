<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Family</title>
    <style>
        h1 {
            font-family: sans-serif;
        }
        p {
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Introduction</h1>
    <p>My name is Vishesh Verma.</p>
    <br>
    <p>I am currently enrolled in Bachelor of Technology in Computer Science with specialisation in Artificial Intelligence and Machine Learning.</p>
    <br>
    <p>I am in my 1st year of college and I am currently learning about CSS.</p>

<!--

Font-family is a CSS property that specifies the font of an element. 
It can take a list of font names as its value, where the browser will use the first available font in the list. 
If none of the specified fonts are available, it will use a default font.    

for example :
h1 {
    font-family: specified-font;
}

Specific font - https://www.cssfontstack.com/

-->

</body>
</html>
