<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font-size</title>
    <style>
        h1 {
            font-size: 36px;
        }
        p {
            font-size: 18px;
        }
        </style>
</head>
<body>
    <h1>Introduction</h1>
    <p>My name is Vishesh Verma.</p>
    <br>
    <p>I am currently enrolled in Bachelor of Technology in Computer Science with specialisation in Artificial Intelligence and Machine Learning.</p>
    <br>
    <p>I am in my 1st year of college and I am currently learning about CSS.</p>

<!--

Font-size is a CSS property that specifies the size of the font.
It can take various units such as pixels px, em, rem, percentages %, etc
for example :
h1 {    
    font-size: specified-size;
}
    
-->    
</body>
</html>
