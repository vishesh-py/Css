<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Image</title>
    <style>
        body {
            background-image: url('https://www.w3schools.com/css/img_lights.jpg');
        }
        h1,p {
            color: white;
            font-family: monospace;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Background Image</h1>
    <p>This is an example of a background image.</p>

<!--
background-image is a CSS property that sets an image as the background of an element.
It can take a URL to an image as its value. or relative path to the image in the project directory.

for example :
body {      
    background-image: url('path-to-image');
}           
-->    
</body>
</html>
