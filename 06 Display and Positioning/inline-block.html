<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.rectangle {
  display: inline-block;
  width: 200px;
  height: 300px;
  background-color:aliceblue;
  border: 1px solid black;
  margin: 10px;

}
.rectangle p {
  text-align: center;
  line-height: 300px; /* Vertically center the text */
  margin: 0;
}
</style>
</head>
<body>

    <div class="rectangle">
        <p>I’m a rectangle!</p>
    </div>

    <div class="rectangle">
        <p>So am I!</p>
    </div>

    <div class="rectangle">
        <p>Me three!</p>
    </div>
<!--
    
1. display:inline-block keeps elements on the same line.
 2. width property works. 
 3. height property works. 
 4. Elements do NOT take full width. 
 5. Multiple inline-block elements can appear side by side. 
 6. Used for cards and layouts.
  7. More flexible than inline. 
  8. Unlike block, it doesn't force a new line.
  
  9. Unlike inline, width and height work. 
  10. Best of both inline and block.-->
</body>
</html>
