```html
<!DOCTYPE html>
<html>
<head>
<style>

.box1{
    width:150px;
    height:150px;
    background:red;

    position:absolute;
    top:50px;
    left:50px;

    z-index:10;
}

.box2{
    width:150px;
    height:150px;
    background:blue;

    position:absolute;
    top:100px;
    left:100px;

    z-index: 2;
}

</style>
</head>
<body>

<div class="box1">z-index: 1</div>

<div class="box2">z-index: 2</div>

<!--
=========================================
Z-INDEX NOTES
=========================================

1. z-index controls stacking order.

2. Higher z-index appears on top.

3. Lower z-index appears behind.

4. Works on positioned elements:
   relative, absolute, fixed, sticky.

5. Default z-index is auto.

6. Can use negative values.

7. Useful when elements overlap.

8. Common uses:
   - Modals
   - Popups
   - Dropdown menus
   - Notifications

9. Example:
   z-index: 10 appears above z-index: 5

10. Memory Trick:
    x-axis = left/right
    y-axis = up/down
    z-axis = front/back

=========================================
-->
</body>
</html>
```
