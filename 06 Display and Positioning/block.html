<!DOCTYPE html>
<html>
<head>
<style>

.box{
    display: block;
    width: 200px;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid black;
}

#box1{
    background: lightgreen;
}

#box2{
    background: lightcoral;
}

</style>
</head>
<body>

<h1>Block Display Demo</h1>

<div class="box" id="box1">Hello</div>
<div class="box" id="box2">World</div>

<!--
BLOCK NOTES

1. display:block makes an element start on a new line.

2. A block element takes the full available width by default.

3. width and height properties work.

4. Multiple block elements stack vertically.

5. Common block elements:
   div, p, h1-h6, section, article

6. Any element can be made block using:
   display: block;

Memory Trick:

Inline = Same line
Block  = New line

Output:

[ Hello ]
[ World ]

(Each element appears on a separate line.)
-->

</body>
</html>
