<!DOCTYPE html>
<html>
<head>
<style>

.box1{
    float: left;
    width: 100px;
    height: 100px;
    background: lightgreen;
}

.box2{
    float: left;
    width: 100px;
    height: 100px;
    background: lightcoral;
}

</style>
</head>
<body>

<h1>Float Demo</h1>

<div class="box1">Box 1</div>
<div class="box2">Box 2</div>

<!--
FLOAT NOTES

1. float:left moves an element to the left.
2. Other elements flow around it.
3. float:right moves an element to the right.
4. Floated elements are taken out of normal flow.
5. Commonly used for image-text layouts.

Memory Trick:
float:left  = stick to left
float:right = stick to right
-->

</body>
</html>
