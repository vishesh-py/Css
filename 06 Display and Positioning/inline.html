<!DOCTYPE html>
<html>
<head>
<style>

.box{
    display: inline;
    padding: 10px;
    border: 1px solid black;
}

#box1{
    background: lightgreen;
}

#box2{
    background: lightcoral;
}

</style>
</head>
<body>

<h1>Inline Display Demo</h1>

<div class="box" id="box1">Hello</div>
<div class="box" id="box2">World</div>

<!--
INLINE NOTES

1. display:inline makes an element stay on the same line.
2. It only takes the width needed by its content.
3. Multiple inline elements can appear side by side.
4. width and height do not work on inline elements.
5. Common inline elements: span, a, em, strong.
6. Inline = Inside the line.

Output:
[Hello] [World]
(on the same line)
-->

</body>
</html>
