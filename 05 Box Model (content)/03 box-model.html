<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Border Box Model</title>

  <style>
    /* Universal selector applies border-box to all elements */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 30px;
    }

    .box {
      width: 300px;
      height: 200px;
      padding: 20px;
      border: 5px solid #4f768e;
      background-color: lightblue;
      margin: auto;
      text-align: center;
    }

    h1 {
      margin-top: 50px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Hello World</h1>
    <p>This box uses the border-box model.</p>
  </div>

  <!-- 1. This page demonstrates the new border-box model -->
  
  <!-- 2. The universal selector (*) targets all HTML elements -->
  
  <!-- 3. box-sizing: border-box keeps width and height fixed -->
  
  <!-- 4. Padding is included inside the total width and height -->
  
  <!-- 5. Border is also included inside the box dimensions -->
  
  <!-- 6. The box will not grow larger after adding padding -->
  
  <!-- 7. This makes website layouts easier to manage -->
  
  <!-- 8. The box below has fixed dimensions -->
  
  <!-- 9. Width remains 300px even with border and padding -->
  
  <!-- 10. border-box is commonly used in modern web design -->
</body>
</html>
