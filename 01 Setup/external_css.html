<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Css</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Introduction </h1>
    <br>
    <p>External CSS is a separate file with .css extension that contains all the CSS code for styling the HTML document. It is linked to the HTML document using the <link> tag in the head section.</p>
    <br>

    <!--External Css-->
    <!--1. Create an external CSS file with a .css extension -->
    <!--2. Write the CSS code in the external CSS file -->
    <!--3. Link the external CSS file to the HTML document using the <link> tag in the head section -->
    <!--Example of External CSS-->
    <!--
        p {color: blue;}
        -->
    <!--In the above example, we have created an external CSS file named style.css and added the CSS code to style the paragraph element with blue color. We then linked the external CSS file to our HTML document using the <link> tag in the head section. Now, all the paragraph elements in our HTML document will be styled with blue color as defined in the external CSS file.-->
</body>
</html>
